# --- Service identity ---
spring.application.name=notification-service
server.port=${NOTIFICATION_SERVICE_PORT:8082}

# --- MongoDB ---
# Default targets the local docker-compose mongodb instance. Override via env in
# any other deployment. We deliberately don't set auth here for the demo — the
# Mongo container has no users configured.
spring.data.mongodb.uri=${MONGO_URI:mongodb://localhost:27017/notifications}

# --- JWT (shared secret with the monolith and social-service) ---
# Same Base64-encoded HMAC secret. Each microservice validates independently;
# none of them issue tokens.
app.jwt.secret=${JWT_SECRET}

# --- Actuator ---
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always

# --- CORS ---
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173}
