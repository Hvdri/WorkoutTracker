# --- Service identity ---
spring.application.name=social-service
server.port=${SOCIAL_SERVICE_PORT:8081}

# --- Datasource ---
# Defaults are docker-compose values for the dedicated postgres-social instance.
# Override via env var in non-default environments. H2 fallback enabled for tests
# via spring.profiles.active=test.
spring.datasource.url=${SOCIAL_DB_URL:jdbc:postgresql://localhost:5433/social}
spring.datasource.username=${SOCIAL_DB_USERNAME:postgres}
spring.datasource.password=${SOCIAL_DB_PASSWORD:postgres}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# --- JWT (shared secret with the monolith) ---
# Same secret as the monolith so it can validate tokens issued by user-auth.
# This is the deviation from awbd2026/product-hub which uses Keycloak JWK; here we
# pre-share a symmetric key for simplicity. Documented in README.
app.jwt.secret=${JWT_SECRET}

# --- Main app client ---
# Base URI for the monolith. In docker-compose this becomes http://backend:8080.
app.main-app.uri=${MAIN_APP_URI:http://localhost:8080}

# --- Resilience4j circuit breaker config ---
# Matches the shape used in awbd2026/product-hub/product-api-app for the DiscountClient.
# Sliding window of last 5 calls; if 50% fail the breaker opens for 15s.
resilience4j.circuitbreaker.instances.main-app.sliding-window-size=5
resilience4j.circuitbreaker.instances.main-app.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.main-app.wait-duration-in-open-state=15s
resilience4j.circuitbreaker.instances.main-app.permitted-number-of-calls-in-half-open-state=2

# --- Actuator ---
management.endpoints.web.exposure.include=health,info,metrics,circuitbreakers
management.endpoint.health.show-details=always

# --- CORS ---
# Mirrors the monolith. Same env var, same default. Vite dev server origin.
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173}
