spring:
  datasource:
    url: jdbc:h2:mem:workouttracker_test;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
    driver-class-name: org.h2.Driver

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    database-platform: org.hibernate.dialect.H2Dialect

  h2:
    console:
      enabled: true

app:
  jwt:
    # Base64 of "test-secret-key-for-testing-only" (32 bytes = 256 bits, minimum for HMAC-SHA256)
    secret: dGVzdC1zZWNyZXQta2V5LWZvci10ZXN0aW5nLW9ubHk=
    expiration-ms: 3600000 # 1 hour
  # Deterministic admin password for the test profile — referenced by DataInitializer
  # so integration tests can log in as admin without env-var setup.
  admin:
    password: admin123

logging:
  level:
    "[com.workout_tracker]": DEBUG
