spring:
  application:
    name: workout-tracker

  profiles:
    active: dev

  jpa:
    open-in-view: false
    properties:
      hibernate:
        "[format_sql]": true

  # Cap pageable.size globally so a malicious or careless ?size=10000 can't
  # force /api/logs (or any future paginated endpoint) to materialize an unbounded result.
  data:
    web:
      pageable:
        default-page-size: 20
        max-page-size: 100

server:
  port: 8080

# JWT config
app:
  jwt:
    secret: ${JWT_SECRET}
    expiration-ms: 86400000 # 24 hours
  cors:
    # Override with CORS_ALLOWED_ORIGINS env var in production (comma-separated URLs)
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://127.0.0.1:5173}
  admin:
    # Seeded admin user (DataInitializer). The base config has NO default password —
    # dev and test profiles supply their own. Production must set ADMIN_PASSWORD or
    # the application will fail to start. Username and email are also overridable.
    username: ${ADMIN_USERNAME:admin}
    email: ${ADMIN_EMAIL:admin@workouttracker.com}
    password: ${ADMIN_PASSWORD}
  notification-service:
    # Base URI for fire-and-forget calls to notification-service. In docker-compose
    # this becomes http://notification-service:8082; bare localhost is the dev default.
    uri: ${NOTIFICATION_SERVICE_URI:http://localhost:8082}

# Resilience4j config for the NotificationClient — same shape as social-service's
# main-app breaker. Notification calls are best-effort, so a tripped breaker just
# means the user's completeLog succeeds without a notification being persisted.
resilience4j:
  circuitbreaker:
    instances:
      notification-service:
        sliding-window-size: 5
        failure-rate-threshold: 50
        wait-duration-in-open-state: 15s
        permitted-number-of-calls-in-half-open-state: 2
