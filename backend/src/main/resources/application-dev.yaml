spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/workouttracker}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    database-platform: org.hibernate.dialect.PostgreSQLDialect

logging:
  level:
    "[com.workout_tracker]": DEBUG
    "[org.springframework.security]": DEBUG

# Dev-only fallback for the seeded admin password. Real deployments must set
# ADMIN_PASSWORD via .env or the environment; this default is local-only.
app:
  admin:
    password: ${ADMIN_PASSWORD:admin123}
